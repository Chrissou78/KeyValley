<!DOCTYPE html>
<html class="dark" lang="en">
<!-- VERSION: 2026-04-02 - Fixed WalletTwo URLs + logout -->
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Admin Login | Kea Valley</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'primary': '#ee9d2b',
                        'primary-light': '#fbdea6',
                        'background-dark': '#0a0a0a',
                        'surface': '#121212'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Manrope', sans-serif; background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%); }
        .font-serif { font-family: 'Playfair Display', serif; }
        .wallet-iframe-container { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .wallet-iframe { width: 100%; height: 800px; border: none; }
    </style>
</head>
<body class="min-h-screen text-white flex flex-col">
    
    <!-- Header -->
    <header class="fixed top-0 w-full z-50 border-b border-white/5" style="backdrop-filter: blur(12px); background: rgba(26,26,26,0.95);">
        <div class="max-w-[1400px] mx-auto px-6 flex items-center justify-between h-16">
            <a href="/" class="flex items-center gap-3">
                <img src="/images/logo.png" alt="Kea Valley" class="h-10 w-auto"/>
                <span class="text-lg font-bold tracking-widest uppercase text-white font-serif">Kea Valley</span>
            </a>
        </div>
    </header>

    <!-- Main -->
    <main class="flex-1 pt-24 pb-12 px-6 flex items-center justify-center">
        <div class="max-w-md w-full">
            
            <div class="text-center mb-8">
                <h1 class="text-3xl font-serif font-bold text-white mb-2">Admin Login</h1>
                <p class="text-gray-400 text-sm">Sign in with your authorized WalletTwo account</p>
            </div>

            <!-- Card -->
            <div class="bg-surface border border-white/10 rounded-xl overflow-hidden">
                <div class="px-6 py-4 border-b border-white/10 flex items-center justify-between">
                    <h3 id="cardTitle" class="text-xs font-bold uppercase tracking-widest text-primary">Sign In</h3>
                    <span class="material-symbols-outlined text-primary/50">admin_panel_settings</span>
                </div>
                
                <div class="p-6">
                    <!-- Loading -->
                    <div id="loadingContainer" class="text-center py-8">
                        <div class="w-10 h-10 border-2 border-primary border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                        <p id="loadingText" class="text-gray-400 text-sm">Loading...</p>
                    </div>

                    <!-- Login -->
                    <div id="loginContainer" class="hidden">
                        <p class="text-gray-400 text-sm text-center mb-4">Login with your whitelisted email</p>
                        <div class="wallet-iframe-container">
                            <iframe id="walletIframe" class="wallet-iframe" allow="clipboard-write"></iframe>
                        </div>
                        <p class="text-gray-500 text-xs text-center mt-4">Only whitelisted admins can access</p>
                    </div>

                    <!-- Error -->
                    <div id="errorContainer" class="hidden text-center py-6">
                        <div class="w-14 h-14 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-4">
                            <span class="material-symbols-outlined text-red-400 text-2xl">block</span>
                        </div>
                        <h3 class="text-lg font-semibold text-white mb-2">Access Denied</h3>
                        <p id="errorMessage" class="text-red-400 text-sm mb-2"></p>
                        <p id="errorEmail" class="text-gray-500 text-xs font-mono bg-white/5 px-3 py-1 rounded inline-block mb-4 hidden"></p>
                        <div>
                            <button id="tryAgainBtn" class="text-primary text-sm hover:underline">Try Another Account</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="text-center mt-6">
                <a href="/" class="text-gray-500 text-sm hover:text-primary">← Back to Home</a>
            </div>
        </div>
    </main>

    <iframe id="logoutIframe" style="display:none;"></iframe>

    <script>
        // ============================================
        // VERSION: 2026-04-02 - Fixed WalletTwo URLs + logout
        // ============================================
        
        // ============================================
        // Configuration - Loaded from server
        // ============================================
        let CONFIG = {
            WALLETTWO_ORIGIN: 'https://wallet.wallettwo.com',
            WALLETTWO_COMPANY_ID: null,
            ADMIN_STORAGE_KEY: 'keavalley_admin'
        };

        // ============================================
        // State
        // ============================================
        let acceptMessages = false;
        let isLoggingOut = false;

        // ============================================
        // DOM Elements
        // ============================================
        const loadingContainer = document.getElementById('loadingContainer');
        const loginContainer = document.getElementById('loginContainer');
        const errorContainer = document.getElementById('errorContainer');
        const loadingText = document.getElementById('loadingText');
        const errorMessage = document.getElementById('errorMessage');
        const errorEmail = document.getElementById('errorEmail');
        const cardTitle = document.getElementById('cardTitle');
        const walletIframe = document.getElementById('walletIframe');
        const logoutIframe = document.getElementById('logoutIframe');
        const tryAgainBtn = document.getElementById('tryAgainBtn');

        // ============================================
        // UI Functions
        // ============================================
        function hideAll() {
            loadingContainer.classList.add('hidden');
            loginContainer.classList.add('hidden');
            errorContainer.classList.add('hidden');
        }

        function showLoading(text) {
            hideAll();
            loadingContainer.classList.remove('hidden');
            loadingText.textContent = text || 'Loading...';
        }

        function showLogin() {
            hideAll();
            loginContainer.classList.remove('hidden');
            cardTitle.textContent = 'Sign In';
            acceptMessages = true;
            console.log('✅ Login shown, acceptMessages =', acceptMessages);
        }

        function showError(msg, email) {
            hideAll();
            errorContainer.classList.remove('hidden');
            errorMessage.textContent = msg;
            cardTitle.textContent = 'Access Denied';
            acceptMessages = false;
            if (email) {
                errorEmail.textContent = email;
                errorEmail.classList.remove('hidden');
            } else {
                errorEmail.classList.add('hidden');
            }
        }

        // ============================================
        // Build WalletTwo URL (UPDATED)
        // Auth: /auth/login?action=session
        // Logout: /action/logout
        // ============================================
        function buildWalletTwoUrl(action, extraParams = {}) {
            let url;
            
            if (action === 'auth') {
                // CORRECT: Use /auth/login?action=session for authentication
                url = `${CONFIG.WALLETTWO_ORIGIN}/auth/login?action=session&iframe=true`;
            } else if (action === 'logout') {
                // Use /action/logout for instant logout
                url = `${CONFIG.WALLETTWO_ORIGIN}/action/logout?iframe=true&auto_accept=true`;
            } else {
                url = `${CONFIG.WALLETTWO_ORIGIN}/action/${action}?iframe=true`;
            }
            
            if (CONFIG.WALLETTWO_COMPANY_ID) {
                url += `&companyId=${CONFIG.WALLETTWO_COMPANY_ID}`;
            }
            
            for (const [key, value] of Object.entries(extraParams)) {
                url += `&${key}=${encodeURIComponent(value)}`;
            }
            
            // Cache buster
            url += `&_t=${Date.now()}`;
            
            console.log('🔗 Built URL:', url);
            return url;
        }

        // ============================================
        // Iframe Initialization
        // ============================================
        function initIframe() {
            const iframeSrc = buildWalletTwoUrl('auth');
            console.log('🖼️ Initializing iframe:', iframeSrc);
            walletIframe.src = iframeSrc;
        }

        // ============================================
        // Logout (UPDATED - Full page redirect)
        // ============================================
        function performLogout() {
            if (isLoggingOut) return;
            isLoggingOut = true;
            acceptMessages = false;
            
            console.log('🚪 Performing logout...');
            localStorage.removeItem(CONFIG.ADMIN_STORAGE_KEY);
            
            fetch('/api/admin/logout', { method: 'POST', credentials: 'include' }).catch(() => {});
            
            // Use full-page redirect for proper session clearing
            const logoutUrl = `${CONFIG.WALLETTWO_ORIGIN}/action/logout?auto_accept=true&companyId=${CONFIG.WALLETTWO_COMPANY_ID}&redirect_uri=${encodeURIComponent(window.location.origin + '/')}`;
            console.log('🚪 Redirecting to logout:', logoutUrl);
            window.location.href = logoutUrl;
        }

        // ============================================
        // Try Again (logout and show login again)
        // ============================================
        function tryAgain() {
            if (isLoggingOut) return;
            isLoggingOut = true;
            acceptMessages = false;
            
            console.log('🔄 Try again - logging out first...');
            showLoading('Signing out...');
            
            localStorage.removeItem(CONFIG.ADMIN_STORAGE_KEY);
            fetch('/api/admin/logout', { method: 'POST', credentials: 'include' }).catch(() => {});
            
            // Use iframe for logout then reload auth iframe
            logoutIframe.src = buildWalletTwoUrl('logout');
            
            setTimeout(() => {
                isLoggingOut = false;
                walletIframe.src = buildWalletTwoUrl('auth');
                setTimeout(() => showLogin(), 500);
            }, 1500);
        }

        // ============================================
        // Session Check
        // ============================================
        async function checkSession() {
            const params = new URLSearchParams(window.location.search);
            
            if (params.get('logout') === 'true') {
                console.log('🚪 Logout flag detected');
                window.history.replaceState({}, '', '/admin/login.html');
                performLogout();
                return;
            }
            
            console.log('🔍 Checking existing session...');
            try {
                const res = await fetch('/api/admin/session', { credentials: 'include' });
                const data = await res.json();
                console.log('📋 Session check result:', data);
                
                if (data.authenticated && data.admin) {
                    console.log('✅ Already authenticated, redirecting to dashboard...');
                    window.location.href = '/admin/';
                    return;
                }
            } catch (e) {
                console.error('❌ Session check failed:', e);
            }
            
            console.log('🔓 No session, showing login...');
            initIframe();
            showLogin();
        }

        // ============================================
        // Authentication Flow
        // ============================================
        async function exchangeAndAuth(code, wallet) {
            console.log('🔄 Starting exchange for wallet:', wallet);
            showLoading('Verifying credentials...');
            
            try {
                console.log('📤 Calling /api/wallettwo/exchange...');
                const res = await fetch('/api/wallettwo/exchange', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code })
                });
                const data = await res.json();
                console.log('📥 Exchange response:', data);
                
                const email = data.email || data.user?.email;
                const name = data.name || data.user?.name || data.user?.given_name;
                
                console.log('👤 Extracted - email:', email, 'name:', name);
                
                if (!email) {
                    console.error('❌ No email in response');
                    showError('No email found in your WalletTwo account.', null);
                    return;
                }
                
                showLoading('Checking admin access...');
                console.log('📤 Calling /api/admin/auth...');
                
                const authRes = await fetch('/api/admin/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, walletAddress: wallet, name })
                });
                const authData = await authRes.json();
                console.log('📥 Auth response:', authData);
                
                if (authData.success && authData.admin) {
                    console.log('✅ Admin authenticated!');
                    localStorage.setItem(CONFIG.ADMIN_STORAGE_KEY, JSON.stringify(authData.admin));
                    window.location.href = '/admin/';
                } else {
                    console.error('❌ Auth denied:', authData.error);
                    showError(authData.error || 'Access denied.', email);
                }
            } catch (e) {
                console.error('❌ Exchange/Auth error:', e);
                showError('Authentication failed. Please try again.', null);
            }
        }

        // ============================================
        // WalletTwo Message Handler
        // ============================================
        window.addEventListener('message', (event) => {
            console.log('📨 Message from:', event.origin);
            
            if (!event.origin.includes('wallettwo.com')) {
                return;
            }
            
            const data = event.data;
            console.log('🔔 WalletTwo message:', data);
            
            if (isLoggingOut) {
                console.log('⏭️ Ignoring - logging out');
                return;
            }
            
            if (!acceptMessages) {
                console.log('⏭️ Ignoring - acceptMessages is false');
                return;
            }
            
            // Support both wallet_login (per docs) and wallet_session (for compatibility)
            const isLoginEvent = data && (
                data.event === 'wallet_login' ||
                data.type === 'wallet_login' ||
                data.event === 'wallet_session' ||
                data.type === 'wallet_session'
            );
            
            if (isLoginEvent) {
                const wallet = data.wallet || data.wlt || data.address;
                const code = data.code || data.token; // Support both code and token
                
                console.log('🔐 Login event - wallet:', wallet, 'code:', code ? 'present' : 'missing');
                
                if (wallet && code) {
                    console.log('✅ Valid login, processing...');
                    acceptMessages = false;
                    exchangeAndAuth(code, wallet);
                } else {
                    console.warn('⚠️ Missing wallet or code');
                    showError('Could not retrieve account details. Please try again.', null);
                }
            }
            
            if (data && (data.type === 'wallet_logout' || data.event === 'wallet_logout')) {
                console.log('🚪 Logout event received');
            }
        });

        // ============================================
        // Event Listeners
        // ============================================
        tryAgainBtn?.addEventListener('click', tryAgain);

        // ============================================
        // Initialize - Load config first
        // ============================================
        async function init() {
            console.log('🚀 Admin login page initializing... (v2026-04-02)');
            showLoading('Loading...');
            
            // Load companyId from server
            try {
                console.log('📥 Loading config...');
                const res = await fetch('/api/config/public');
                const data = await res.json();
                CONFIG.WALLETTWO_COMPANY_ID = data.walletTwoCompanyId;
                console.log('✅ Config loaded, companyId:', CONFIG.WALLETTWO_COMPANY_ID);
            } catch (e) {
                console.error('❌ Failed to load config:', e);
            }
            
            await checkSession();
        }

        init();
    </script>
</body>
</html>
