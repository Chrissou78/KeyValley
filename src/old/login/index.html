<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login | Kea Valley</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'primary': '#ee9d2b',
                        'primary-light': '#fbdea6',
                        'background-dark': '#0a0a0a',
                        'surface': '#121212'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Manrope', sans-serif; background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%); }
        .font-serif { font-family: 'Playfair Display', serif; }
        .wallet-iframe-container { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .wallet-iframe { width: 100%; height: 500px; border: none; }
    </style>
</head>
<body class="min-h-screen text-white flex flex-col">
    
    <!-- Header -->
    <header class="fixed top-0 w-full z-50 border-b border-white/5" style="backdrop-filter: blur(12px); background: rgba(26,26,26,0.95);">
        <div class="max-w-7xl mx-auto px-6 flex items-center justify-between h-16">
            <a href="/" class="flex items-center gap-3">
                <img src="/images/logo.png" alt="Kea Valley" class="h-10 w-auto"/>
                <span class="text-lg font-bold tracking-widest uppercase text-white font-serif">Kea Valley</span>
            </a>
            <nav class="hidden md:flex items-center gap-8">
                <a href="/marketplace/" class="text-sm text-gray-400 hover:text-primary transition-colors">Marketplace</a>
                <a href="/profile/" class="text-sm text-gray-400 hover:text-primary transition-colors">Profile</a>
            </nav>
        </div>
    </header>

    <!-- Main -->
    <main class="flex-1 pt-24 pb-12 px-6 flex items-center justify-center">
        <div class="max-w-md w-full">
            
            <div class="text-center mb-8">
                <h1 class="text-3xl font-serif font-bold text-white mb-2">Welcome Back</h1>
                <p class="text-gray-400 text-sm">Sign in with your WalletTwo account</p>
            </div>

            <!-- Card -->
            <div class="bg-surface border border-white/10 rounded-xl overflow-hidden">
                <div class="px-6 py-4 border-b border-white/10 flex items-center justify-between">
                    <h3 id="cardTitle" class="text-xs font-bold uppercase tracking-widest text-primary">Sign In</h3>
                    <span class="material-symbols-outlined text-primary/50">account_circle</span>
                </div>
                
                <div class="p-6">
                    <!-- Loading -->
                    <div id="loadingContainer" class="text-center py-8">
                        <div class="w-10 h-10 border-2 border-primary border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                        <p id="loadingText" class="text-gray-400 text-sm">Loading...</p>
                    </div>

                    <!-- Login -->
                    <div id="loginContainer" class="hidden">
                        <p class="text-gray-400 text-sm text-center mb-4">Connect your wallet to continue</p>
                        <div class="wallet-iframe-container">
                            <iframe id="walletIframe" class="wallet-iframe" allow="clipboard-write"></iframe>
                        </div>
                    </div>

                    <!-- Error -->
                    <div id="errorContainer" class="hidden text-center py-6">
                        <div class="w-14 h-14 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-4">
                            <span class="material-symbols-outlined text-red-400 text-2xl">error</span>
                        </div>
                        <h3 class="text-lg font-semibold text-white mb-2">Login Failed</h3>
                        <p id="errorMessage" class="text-red-400 text-sm mb-4"></p>
                        <button id="tryAgainBtn" class="text-primary text-sm hover:underline">Try Again</button>
                    </div>

                    <!-- Success -->
                    <div id="successContainer" class="hidden text-center py-6">
                        <div class="w-14 h-14 bg-green-500/10 rounded-full flex items-center justify-center mx-auto mb-4">
                            <span class="material-symbols-outlined text-green-400 text-2xl">check_circle</span>
                        </div>
                        <h3 class="text-lg font-semibold text-white mb-2">Welcome!</h3>
                        <p id="welcomeMessage" class="text-gray-400 text-sm mb-2"></p>
                        <p class="text-gray-500 text-xs">Redirecting...</p>
                    </div>
                </div>
            </div>

            <div class="text-center mt-6">
                <a href="/" class="text-gray-500 text-sm hover:text-primary">← Back to Home</a>
            </div>
        </div>
    </main>

    <iframe id="logoutIframe" style="display:none;"></iframe>

    <script>
        // ============================================
        // Configuration - Loaded from server
        // ============================================
        let CONFIG = {
            WALLETTWO_ORIGIN: 'https://wallet.wallettwo.com',
            WALLETTWO_COMPANY_ID: null,
            USER_STORAGE_KEY: 'keavalley_user'
        };

        // ============================================
        // State
        // ============================================
        let acceptMessages = false;
        let isLoggingOut = false;
        let redirectUrl = '/profile/';

        // ============================================
        // DOM Elements
        // ============================================
        const loadingContainer = document.getElementById('loadingContainer');
        const loginContainer = document.getElementById('loginContainer');
        const errorContainer = document.getElementById('errorContainer');
        const successContainer = document.getElementById('successContainer');
        const loadingText = document.getElementById('loadingText');
        const errorMessage = document.getElementById('errorMessage');
        const welcomeMessage = document.getElementById('welcomeMessage');
        const cardTitle = document.getElementById('cardTitle');
        const walletIframe = document.getElementById('walletIframe');
        const logoutIframe = document.getElementById('logoutIframe');
        const tryAgainBtn = document.getElementById('tryAgainBtn');

        // ============================================
        // UI Functions
        // ============================================
        function hideAll() {
            loadingContainer.classList.add('hidden');
            loginContainer.classList.add('hidden');
            errorContainer.classList.add('hidden');
            successContainer.classList.add('hidden');
        }

        function showLoading(text) {
            hideAll();
            loadingContainer.classList.remove('hidden');
            loadingText.textContent = text || 'Loading...';
        }

        function showLogin() {
            hideAll();
            loginContainer.classList.remove('hidden');
            cardTitle.textContent = 'Sign In';
            acceptMessages = true;
            console.log('✅ Login shown, acceptMessages =', acceptMessages);
        }

        function showError(msg) {
            hideAll();
            errorContainer.classList.remove('hidden');
            errorMessage.textContent = msg;
            cardTitle.textContent = 'Error';
            acceptMessages = false;
        }

        function showSuccess(name) {
            hideAll();
            successContainer.classList.remove('hidden');
            welcomeMessage.textContent = name ? `Hello, ${name}!` : 'Login successful!';
            cardTitle.textContent = 'Success';
        }

        // ============================================
        // Build WalletTwo URL with companyId
        // ============================================
        function buildWalletTwoUrl(action, extraParams = {}) {
            let url = `${CONFIG.WALLETTWO_ORIGIN}/action/${action}?iframe=true`;
            
            if (CONFIG.WALLETTWO_COMPANY_ID) {
                url += `&companyId=${CONFIG.WALLETTWO_COMPANY_ID}`;
            }
            
            for (const [key, value] of Object.entries(extraParams)) {
                url += `&${key}=${encodeURIComponent(value)}`;
            }
            
            return url;
        }

        // ============================================
        // Iframe Initialization
        // FIXED: Use /action/auth with companyId
        // ============================================
        function initIframe() {
            const iframeSrc = buildWalletTwoUrl('auth');
            console.log('🖼️ Initializing iframe:', iframeSrc);
            walletIframe.src = iframeSrc;
        }

        // ============================================
        // Try Again
        // ============================================
        function tryAgain() {
            if (isLoggingOut) return;
            isLoggingOut = true;
            acceptMessages = false;
            
            console.log('🔄 Try again - logging out first...');
            showLoading('Signing out...');
            
            localStorage.removeItem(CONFIG.USER_STORAGE_KEY);
            
            logoutIframe.src = buildWalletTwoUrl('logout');
            
            setTimeout(() => {
                isLoggingOut = false;
                walletIframe.src = buildWalletTwoUrl('auth', { t: Date.now() });
                setTimeout(() => showLogin(), 500);
            }, 1500);
        }

        // ============================================
        // Session Check
        // ============================================
        async function checkSession() {
            // Check for redirect parameter
            const params = new URLSearchParams(window.location.search);
            if (params.get('redirect')) {
                redirectUrl = decodeURIComponent(params.get('redirect'));
            }
            
            // Check for logout flag
            if (params.get('logout') === 'true') {
                console.log('🚪 Logout flag detected');
                window.history.replaceState({}, '', '/login.html');
                localStorage.removeItem(CONFIG.USER_STORAGE_KEY);
                logoutIframe.src = buildWalletTwoUrl('logout');
                await new Promise(r => setTimeout(r, 500));
            }
            
            // Check existing session
            const stored = localStorage.getItem(CONFIG.USER_STORAGE_KEY);
            if (stored) {
                try {
                    const user = JSON.parse(stored);
                    if (user.wallet) {
                        console.log('✅ Existing session found, redirecting...');
                        window.location.href = redirectUrl;
                        return true;
                    }
                } catch (e) {
                    localStorage.removeItem(CONFIG.USER_STORAGE_KEY);
                }
            }
            
            return false;
        }

        // ============================================
        // Authentication Flow
        // Per WalletTwo docs: field is 'code'
        // ============================================
        async function exchangeAndLogin(code, wallet) {
            console.log('🔄 Starting exchange for wallet:', wallet);
            showLoading('Verifying credentials...');
            
            try {
                const res = await fetch('/api/wallettwo/exchange', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code })
                });
                const data = await res.json();
                console.log('📥 Exchange response:', data);
                
                if (!data.success && !data.access_token && !data.user) {
                    throw new Error(data.error || 'Exchange failed');
                }
                
                const user = {
                    wallet: wallet,
                    email: data.email || data.user?.email,
                    name: data.name || data.user?.name || data.user?.given_name,
                    firstName: data.firstName || data.user?.given_name,
                    lastName: data.lastName || data.user?.family_name,
                    accessToken: data.access_token,
                    timestamp: Date.now()
                };
                
                console.log('👤 User data:', user);
                
                localStorage.setItem(CONFIG.USER_STORAGE_KEY, JSON.stringify(user));
                
                showSuccess(user.name || user.firstName);
                
                setTimeout(() => {
                    window.location.href = redirectUrl;
                }, 1500);
                
            } catch (e) {
                console.error('❌ Exchange error:', e);
                showError('Login failed. Please try again.');
            }
        }

        // ============================================
        // WalletTwo Message Handler
        // Per docs: event is 'wallet_login', field is 'code'
        // ============================================
        window.addEventListener('message', (event) => {
            if (!event.origin.includes('wallettwo.com')) {
                return;
            }
            
            const data = event.data;
            console.log('🔔 WalletTwo message:', data);
            
            if (isLoggingOut) {
                console.log('⏭️ Ignoring - logging out');
                return;
            }
            
            if (!acceptMessages) {
                console.log('⏭️ Ignoring - acceptMessages is false');
                return;
            }
            
            // Per WalletTwo docs: event is 'wallet_login'
            // Also support wallet_session for compatibility
            const isLoginEvent = data && (
                data.event === 'wallet_login' ||
                data.type === 'wallet_login' ||
                data.event === 'wallet_session' ||
                data.type === 'wallet_session'
            );
            
            if (isLoginEvent) {
                const wallet = data.wallet || data.wlt || data.address;
                const code = data.code || data.token; // Per docs: 'code', fallback to 'token'
                
                console.log('🔐 Login event - wallet:', wallet, 'code:', code ? 'present' : 'missing');
                
                if (wallet && code) {
                    console.log('✅ Valid login, processing...');
                    acceptMessages = false;
                    exchangeAndLogin(code, wallet);
                } else {
                    console.warn('⚠️ Missing wallet or code');
                    showError('Could not retrieve account details. Please try again.');
                }
            }
            
            if (data && (data.type === 'wallet_logout' || data.event === 'wallet_logout')) {
                console.log('🚪 Logout event received');
            }
        });

        // ============================================
        // Event Listeners
        // ============================================
        tryAgainBtn?.addEventListener('click', tryAgain);

        // ============================================
        // Initialize - Load config first
        // ============================================
        async function init() {
            console.log('🚀 Login page initializing...');
            showLoading('Loading...');
            
            // Load companyId from server
            try {
                const res = await fetch('/api/config/public');
                const data = await res.json();
                CONFIG.WALLETTWO_COMPANY_ID = data.walletTwoCompanyId;
                console.log('✅ Loaded companyId:', CONFIG.WALLETTWO_COMPANY_ID);
            } catch (e) {
                console.error('❌ Failed to load config:', e);
            }
            
            const hasSession = await checkSession();
            if (hasSession) return;
            
            initIframe();
            showLogin();
        }

        init();
    </script>
</body>
</html>
