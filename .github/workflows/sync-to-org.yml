name: Sync to OC-Labs

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Push to OC-Labs repo
        run: |
          git push --mirror https://x-access-token:${{ secrets.ORG_SYNC_TOKEN }}@github.com/OC-Labs/kea-valley.git
